name: Docker Build and Push
description: Builda e opcionalmente faz push de uma imagem Docker para o Docker Hub

inputs:
  image-name:
    description: "Nome completo da imagem"
    required: true
  image-tag:
    description: "Tag da imagem"
    required: true
  push:
    description: "Se deve fazer push da imagem (true/false)"
    required: false
    default: "false"
  docker-username:
    description: "Usuário do Docker Hub (obrigatório quando push=true)"
    required: false
    default: ""
  docker-password:
    description: "Token ou senha do Docker Hub (obrigatório quando push=true)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login no Docker Hub
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-password }}

    - name: Build e Push da imagem
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ inputs.push }}
        tags: |
          ${{ inputs.image-name }}:${{ inputs.image-tag }}
          ${{ inputs.image-name }}:latest
